<!DOCTYPE html>
<html>
<head>
  <title>Pico Score</title>
</head>
<body>

<h1>Score</h1>
<p id="score">0</p>

<script>
async function update() {
  const res = await fetch("/data");
  const data = await res.json();

  document.getElementById("score").innerText = data.score;
}

setInterval(update, 500);
</script>

</body>
</html>
